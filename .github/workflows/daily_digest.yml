name: Daily News Digest

on:
  schedule:
    # 7:30 AM ET = 11:30 UTC (EDT, Apr–Nov) / 12:30 UTC (EST, Nov–Mar)
    - cron: '30 11 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg)
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore story history cache
        uses: actions/cache@v4
        with:
          path: /tmp/digest_output/sent_stories_history.json
          key: story-history-${{ runner.os }}
          restore-keys: |
            story-history-

      - name: Create output directory
        run: mkdir -p /tmp/digest_output

      - name: Run Daily Digest Pipeline
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
          OUTPUT_DIR:          /tmp/digest_output
        run: python scripts/run_pipeline.py

      - name: Save story history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/digest_output/sent_stories_history.json
          key: story-history-${{ runner.os }}-${{ github.run_id }}
